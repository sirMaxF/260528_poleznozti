<!DOCTYPE html>
<html lang="ru">
<!-- ИСТОЧНИК https://codepen.io/tmrDevelops/pen/GZoKYO -->

<head>
    <meta charset="UTF-8">
    <title>Медленное Северное Сияние</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Убираем полосы прокрутки */
            background-color: #000;
            /* Черный фон */
            height: 100%;
        }

        canvas {
            display: block;
            /* Убирает отступы под canvas */
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

    <canvas id="canv"></canvas>
    <script>
        var c = document.getElementById("canv");
        var $ = c.getContext('2d');
        var w = c.width = window.innerWidth;
        var h = c.height = window.innerHeight;
        var st = 1 / 50, t = 0;
        function draw() {
            $.globalCompositeOperation = 'source-over';
            $.fillStyle = 'hsla(0, 0%, 0%, 1)';
            $.fillRect(0, 0, w, h);
            $.globalCompositeOperation = 'lighter';
            Math.seed = 4;
            for (var j = 0; j < 500; j++) {
                var x = 4 * rnd() - 2 - Math.cos(1.54 * t);
                var y = 4 * rnd() - 2 - Math.sin(1.54 * t);
                if (x * x + y * y < 1) {
                    var d = Math.pow(x * x + y * y, 0);
                    x *= d; y *= d;
                    var s = (5 + Math.sin(t * 9.2)) / 2;
                    x *= s; y *= s;
                    x = x * 100 + w / 2;
                    y = y * 100 + h / 2;
                    var g = $.createRadialGradient(x, y, 0, x, y, 6);
                    g.addColorStop(0, 'hsla(' + j + ', 95%, 50%, .4)');
                    g.addColorStop(.5, 'hsla(' + s + ', 85%, 60%, 1)');
                    g.addColorStop(1, 'hsla(0, 0%, 0%, 0)');
                    $.fillStyle = g;
                    $.beginPath();
                    $.arc(x, y, .5, 0, 2 * Math.PI);
                    $.fill();
                }
            }
            var cnt = 20.0;
            for (var i = 0; i < cnt; i++) {
                var n = cnt / 2 - i;
                noise($, c, w, h, Math.pow(2, 1 / Math.pow(50, n / 10)));
            }
            t += st;
            window.requestAnimationFrame(draw);
        };
        draw();
        function noise($, c, w, h, sc) {
            $.save();
            $.translate(w / 2, h / 2);
            $.scale(sc, sc);
            $.translate(-w / 2, -h / 2);
            $.drawImage(c, 0, 0);
            $.restore();
        }
        function rnd() {
            Math.seed = (Math.seed * 108013 + 2531011) & 0xffffffff;
            return Math.abs(Math.seed >> 16) / 32869;
        }
        window.addEventListener('resize', function () {
            c.width = w = window.innerWidth;
            c.height = h = window.innerHeight;
        }, false);
    </script>

</body>

</html>
