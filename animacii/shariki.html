<!DOCTYPE html>
<html lang="ru">
<!-- ИСТОЧНИК https://codepen.io/hallonanton/pen/MZbYxV -->

<head>
    <meta charset="UTF-8">
    <title>Медленное Северное Сияние</title>
    <style>
        /*
 * Standard Styles
 */
        @import url("https://fonts.googleapis.com/css?family=Source+Sans+Pro:700");

        /* $bg-1: #e3e0dd;
        $bg-2: #eee5da; */

        html,
        body {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            overflow: hidden;
            background: linear-gradient(to bottom right, '#e3e0dd', '#eee5da');
            font-weight: 700;
            text-transform: uppercase;
            font-family: "Source Sans Pro", sans-serif;
        }

        /*
 * More from me link 🔥
 */
        .more {
            position: absolute;
            bottom: 15px;
            right: 15px;
            padding: 7px 21px;
            border-radius: 8px;
            color: #fff;
            background-color: rgba(0, 0, 0, .2);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            overflow: hidden;
            z-index: 1;
            animation: reveal 5000ms cubic-bezier(.87, -.41, .19, 1.44);

            &::before {
                display: block;
                content: "";
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100%;
                max-width: 20%;
                height: 100%;
                border-radius: 8px;
                background-color: rgba(0, 0, 0, 0);
                transition: max-width 0ms ease 250ms,
                    background-color 250ms ease;
                transform: translate(-50%, -50%);
                z-index: -1;
            }

            &:hover {
                &::before {
                    max-width: 100%;
                    background-color: rgba(0, 0, 0, 0.6);
                    transition: all 250ms ease;
                }
            }
        }

        @keyframes reveal {

            0%,
            90% {
                bottom: -30px;
            }

            100% {
                bottom: 15px;
            }
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <script>
        var canvas = document.querySelector('canvas');
        var c = canvas.getContext('2d');

        var mouse = {
            x: undefined,
            y: undefined
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        //Function to get a random color
        function getRandomColor() {

            var colorArray = [
                '#5C4B51',
                '#8CBEB2',
                '#F3B562',
                '#F06060'
            ];

            return colorArray[Math.floor(Math.random() * colorArray.length)];
        }

        //Add eventlisteners
        window.addEventListener('resize', function () {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            init();
        });

        window.addEventListener('mousemove', function (e) {

            var xBorderProximity = (e.x <= 5 || e.x >= canvas.width - 5);
            var yBorderProximity = (e.y <= 5 || e.y >= canvas.height - 5);

            if (!(xBorderProximity || yBorderProximity)) {
                mouse.x = e.x;
                mouse.y = e.y;

            } else {
                mouse.x = undefined;
                mouse.y = undefined;

            }
        });


        //Circle object	
        function Circle(x, y, dx, dy, radius, color) {

            var maxRadius = 20;
            var minRadius = radius;
            var proximity = 30;

            this.x = x || 50;
            this.y = y || 50;
            this.dx = dx || 5;
            this.dy = dy || 5;
            this.radius = radius || 15;
            this.color = color || 'blue';

            //Draw circle
            this.draw = function () {
                c.beginPath();
                c.arc(this.x, this.y, this.radius, Math.PI * 2, false);
                c.fillStyle = this.color;
                c.fill();
            }

            //Update circle position
            this.update = function () {

                //x position and velocity
                this.dx = ((this.x > (innerWidth - this.radius)) || (this.x < this.radius)) ? -this.dx : this.dx;
                this.x += this.dx;

                //y position and velocity
                this.dy = ((this.y > (innerHeight - this.radius)) || (this.y < this.radius)) ? -this.dy : this.dy;
                this.y += this.dy;

                //Mouse interactivity
                var xNearby = (mouse.x - this.x < proximity) && (mouse.x - this.x > -proximity);
                var yNearby = (mouse.y - this.y < proximity) && (mouse.y - this.y > -proximity);

                if (xNearby && yNearby && (this.radius < maxRadius)) {
                    this.radius += 1;

                } else if (this.radius > minRadius) {
                    this.radius -= 1;

                }

                //Draw again after new update
                this.draw();
            }
        }


        //Create an array of circles with different properties
        var circleQuantity = 200;
        var circleMinSize = 4;
        var circleMaxSize = 20;
        var circleArray = [];

        function init() {

            circleArray = [];

            for (var i = 0; i < circleQuantity; i++) {

                var radius = (circleMinSize - 1) + parseInt((circleMaxSize - circleMinSize) * Math.random());
                var x = Math.random() * (innerWidth - radius * 2) + radius;
                var y = Math.random() * (innerHeight - radius * 2) + radius;
                var dx = (Math.random() - 0.5) * 5;
                var dy = (Math.random() - 0.5) * 5;
                var color = getRandomColor();

                circleArray[i] = new Circle(x, y, dx, dy, radius, color);
                circleArray[i].draw();
            }
        }
        init();



        //Trigger the animation
        function animate() {

            //Clear full canvas
            //c.clearRect(x, y, width, height);
            c.clearRect(0, 0, innerWidth, innerHeight);

            //Animate circles
            for (var i = 0; i < circleArray.length; i++) {
                circleArray[i].update();
            }

            //Loop animation
            requestAnimationFrame(animate);
        }
        animate();
    </script>

</body>

</html>
