<!DOCTYPE html>
<html lang="ru">
<!-- ИСТОЧНИК https://codepen.io/yazeed739/pen/mdyPbrY -->

<head>
    <meta charset="UTF-8">
    <title>Медленное Северное Сияние</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Убираем полосы прокрутки */
            background-color: #000;
            /* Черный фон */
            height: 100%;
        }

        canvas {
            display: block;
            /* Убирает отступы под canvas */
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <script>
        function id(el) {
            return document.getElementById(el);
        }

        var canvas = id('canvas');
        var c = canvas.getContext('2d');

        var screen = {
            width: 1536,
            height: 722
        }
        canvas.width = screen.width;
        canvas.height = screen.height;
        var colors = ['white'];

        function Rain(x, y, w, h, fall_speed, color) {
            this.w = w;
            this.h = h;
            this.x = x;
            this.y = y;
            this.fall_speed = fall_speed;
            this.color = color;
            this.draw = function () {
                c.fillStyle = this.color;
                c.fillRect(this.x, this.y, this.w, this.h);

            }
            this.update = function () {
                // this.x += this.dx;
                this.y += this.fall_speed;

                if (this.y >= screen.height) {
                    this.y = -this.h;
                    this.x = Math.floor(Math.random() * screen.width);
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }
                // this.y = screen.floor - this.h;

                this.draw();

            }

        }


        var w = 1;
        var h = 100;
        var fall_speed = 10;
        var rains = [

        ];

        for (var i = 0; i < 30; i++) {
            var x = Math.floor(Math.random() * screen.width);
            var y = Math.floor(Math.random() * screen.height);
            rains.push(new Rain(x, y, w, h, fall_speed, colors[Math.floor(Math.random() * colors.length)]));
        }
        var lastFrame = 0;

        function render(time) {
            var FPS = Math.floor(1000 / (time - lastFrame));
            lastFrame = time;

            requestAnimationFrame(render);
            c.clearRect(0, 0, screen.width, screen.height);
            c.font = '20px Verdana';
            c.fillStyle = 'white';
            c.fillText(FPS + ' FPS', 10, 50);
            for (var i = 0; i < rains.length; i++) {
                rains[i].update();
            }
        }
        render();
    </script>
</body>

</html>
